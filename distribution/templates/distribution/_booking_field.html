<div class="booking-field{% if wide %} booking-field-wide{% endif %}{% if field.errors %} has-error{% endif %}">
  <label for="{{ field.id_for_label }}">{{ field.label }}</label>
  {{ field }}
  {% if field.help_text %}<small>{{ field.help_text }}</small>{% endif %}
  {% for error in field.errors %}<span class="booking-field-error">{{ error }}</span>{% endfor %}
</div>
